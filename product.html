<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفاصيل المنتج | متجري</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="product-details">
    <div class="container" id="product-details-content">
      <!-- يُملأ بـ JS: renderLoadingSkeleton مش مناسب هنا فهنستخدم نص بسيط -->
      <p class="text-secondary">جاري تحميل بيانات المنتج...</p>
    </div>
  </main>

  <!-- Modal تأكيد الطلب -->
  <div class="modal-overlay" id="order-modal-overlay">
    <div class="modal">
      <h2 class="modal__title">تأكيد الطلب</h2>
      <p class="modal__subtitle">راجع تفاصيل طلبك قبل الإرسال</p>

      <div class="modal__summary">
        <span>الكمية: <strong id="modal-qty-display">1</strong></span>
        <span class="modal__summary-total" id="modal-total-display">0 ج.م</span>
      </div>

      <div class="form-group">
        <label for="shipping-address-input">عنوان الشحن</label>
        <textarea id="shipping-address-input" rows="3" placeholder="اكتب عنوانك بالتفصيل (المدينة، الحي، الشارع...)"></textarea>
      </div>

      <div class="modal__actions">
        <button class="btn btn--ghost" id="cancel-order-btn">إلغاء</button>
        <button class="btn btn--primary" id="confirm-order-btn">تأكيد الطلب</button>
      </div>
    </div>
    <button class="visually-hidden" id="close-modal-btn">إغلاق</button>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
