<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حساب جديد | متجري</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="auth-page">
    <div class="auth-card">
      <h1 class="auth-card__title">إنشاء حساب جديد</h1>
      <p class="auth-card__subtitle">انضم إلينا وابدأ التسوق في دقائق</p>

      <form id="register-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="name">الاسم الكامل</label>
          <input type="text" id="name" name="name" required placeholder="اسمك بالكامل" />
        </div>

        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <input type="email" id="email" name="email" required placeholder="example@email.com" />
        </div>

        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" name="password" required minlength="6" placeholder="6 أحرف على الأقل" />
        </div>

        <button type="submit" class="btn btn--primary btn--block">إنشاء الحساب</button>
      </form>

      <p class="auth-card__footer">
        لديك حساب بالفعل؟ <a href="login.html">سجّل الدخول</a>
      </p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/navbar.js"></script>
</body>
</html>
